{% extends "!base.html" %}

{% block extrahead %}
  {{ super() }}
  {% if pagename == "index" %}
    <link rel="canonical" href="https://riskfolio-lib.readthedocs.io/en/latest/" />
  {% else %}
    <link rel="canonical" href="https://riskfolio-lib.readthedocs.io/en/latest/{{ pagename }}.html" />
  {% endif %}
  <meta property="og:site_name" content="Riskfolio-Lib" />
  <meta property="og:title" content="{{ title|striptags }} | Riskfolio-Lib" />
  <meta property="og:description" content="Portfolio optimization in Python with Riskfolio-Lib." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:url" content="https://riskfolio-lib.readthedocs.io/en/latest/{% if pagename != 'index' %}{{ pagename }}.html{% endif %}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ title|striptags }} | Riskfolio-Lib" />
  <meta name="twitter:description" content="Portfolio optimization in Python with Riskfolio-Lib." />
  <meta name="twitter:url" content="https://riskfolio-lib.readthedocs.io/en/latest/{% if pagename != 'index' %}{{ pagename }}.html{% endif %}" />
{% endblock %}

{% endblock %}
